<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
<h1 id="titulo"></h1>
<p>Buscar: </p>	
<input type="text" id="buscar" onkeyup="document.getElementById('titulo').innerHTML = document.getElementById('buscar').value">
<p>Buscar con javaScript</p>
<input type="text" id="buscarJS">
<script>
	document.getElementById("buscarJS").addEventListener("keyup",function(){document.getElementById('titulo').innerHTML = document.getElementById('buscarJS').value})
</script>
</body>
</html>
