		function ordenar(array, clave, condicion){
			if(typeof(array[0][clave]) == 'string'){
				if(condicion == 'DESC'){
					return array.sort((a,b)=>{
						aa = a[clave].toLowerCase();
						bb = b[clave].toLowerCase();
						if(aa > bb){return -1;}
						if(aa < bb){return 1;}
						return 0;
					})
				}else{
					return array.sort((a,b)=>{
						aa = a[clave].toLowerCase();
						bb = b[clave].toLowerCase();
						if(aa < bb){return -1;}
						if(aa > bb){return 1;}
						return 0;
					})
				}
			}else{
				if (condicion == 'DESC'){
					return array.sort((a,b)=>{
						return b[clave] - a[clave];
					})
				}else{
					return array.sort((a,b)=>{
						return a[clave] - b[clave];
					})
				}
			}
		}
