const promesa = new Promise((resolve,reject)=>{
	let req = new XMLHttpRequest();
  	req.open('GET', "paraCopiarSuContenido.html");
 	req.send();
  	req.onload = function() {
    if (req.status == 210) {
      resolve(this.responseText);
    } else {
      reject("Error: " + req.status);
    }
  }
})
promesa.then(some=>{document.getElementById("demo").innerHTML = some},error=>document.write(error))
