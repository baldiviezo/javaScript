<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
<form id="formulario">
	<input type="submit" id="enviar">
</form>
<!--Al hacer click en el boton submit no se recargara la pagina, por q metodo preventDefault lo impide-->
<script>
	document.getElementById("formulario").addEventListener("submit", function(evento){
		//pasamos el evento submit (evento es submit)
		evento.preventDefault();
	});
</script>
</body>
</html>
