	<title>LLamarobjetos</title>

<body>
<script>
	//objeto
	function objeto (nombre, tiempo, disponible) {
	//constructor
		this.nombre = nombre,
		this.tiempo = tiempo,
		this.disponible = disponible
	}
	var objeto1 = new objeto ('alvaro', 2, true);
	console.log(objeto1);
</script>
