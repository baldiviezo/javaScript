document.getElementById('mostrar').addEventListener('click',traerDatos)
	function traerDatos(){
		fetch('archivo.json').then(res=>res.json()).then(dato=>{
			let body = document.getElementById('body')
			body.innerHTML = '';
			for (let fila of dato){
			body.innerHTML += `
				<tr>
					<th>${fila.autor}</th>
					<th>${fila.libro}</th>
					<th>${fila.cantidad}</th>
				</tr>
			`;
		}
		})
	}
