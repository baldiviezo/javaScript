<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>For each</title>
</head>
<body>

</body>
<script>
//------ForEach nos permite iterar un arreglo, para obtener cada uno de sus elementos.
//------ForEach recibe tres elementos.
var arr = ['a', 'z','b', 'r'];
arr.forEach(function(element,index,arreglo){
	console.log(element);
	console.log(index);
	console.log(arreglo);
});
//repuesta en consola:
//a
//0
//['a', 'z','b', 'r']
//z
//1
//['a', 'z','b', 'r']
//b
//2
//['a', 'z','b', 'r']
//r
//3
//['a', 'z','b', 'r']
</script>
</html>
